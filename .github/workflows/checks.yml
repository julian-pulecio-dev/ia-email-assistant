name: Checks

on: [push]

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build containers
        run: docker compose -f docker-compose.ci.yml build

      - name: Start services
        run: docker compose -p ci -f docker-compose.ci.yml up -d
      
      - name: List running containers
        run: |
          docker ps -a
          docker logs ci-app-db-1

      - name: Wait for DB
        run: |
          until docker compose -p ci -f docker-compose.ci.yml exec -T app-db pg_isready -U postgres; do
            sleep 5
          done

      - name: Run migrations
        run: docker compose -p ci -f docker-compose.ci.yml exec -T app python manage.py migrate --settings=app.settings.test

      - name: Run tests
        run: docker compose -p ci -f docker-compose.ci.yml exec -T app python manage.py test --settings=app.settings.test
